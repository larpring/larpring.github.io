<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#16161e" stroke-width="1"/>
    </pattern>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
  </defs>

  <!-- base + grid texture -->
  <rect width="1200" height="630" fill="#0b0b0e"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- square logo (matches site header) -->
  <g transform="translate(96,236)">
    <rect x="0" y="0" width="132" height="132" fill="none" stroke="#9FA1FF" stroke-width="9"/>
    <rect x="35" y="35" width="60" height="60" fill="#AEE2FF"/>
    <rect x="80" y="0" width="28" height="28" fill="#D9F9DF"/>
  </g>

  <!-- wordmark (flat, single color) -->
  <text x="274" y="332" font-family="'Outfit','Inter',sans-serif" font-size="122" font-weight="800" letter-spacing="-4" fill="#f0f0f5">larpring</text>
  <!-- tagline -->
  <text x="278" y="392" font-family="'Inter',sans-serif" font-size="30" fill="#9fa0b2">a little ring of hand-made personal websites</text>
  <!-- url -->
  <text x="278" y="438" font-family="'Inter',sans-serif" font-size="23" letter-spacing="1" fill="#565668">invite only  ·  larpring.github.io</text>

  <!-- grain overlay -->
  <rect width="1200" height="630" filter="url(#grain)" opacity="0.14"/>
</svg>
